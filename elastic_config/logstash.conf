input {
  file {
    path => "/var/log/suricata/eve.json"
    start_position => "beginning"
    sincedb_path => "/var/lib/logstash/plugins/inputs/file/.sincedb_eve"
    codec => json
  }
}

filter {
  if [event_type] == "alert" {
    mutate {
      add_field => { "alert_category" => "security" }
    }
    if [alert][signature] =~ /PHISHING|TROJAN|MALWARE|SUSPICIOUS|MALICIOUS|BLACKLIST/i {
      mutate {
        add_field => { "phishing_alert" => true }
      }
    }
  }
  date {
    match => [ "timestamp", "ISO8601" ]
    target => "@timestamp"
  }
}

output {
  elasticsearch {
    hosts => ["localhost:9200"]
    index => "suricata-%{+YYYY.MM.dd}"
  }
  stdout { codec => rubydebug }
}
